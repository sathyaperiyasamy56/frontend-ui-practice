<!doctype html>
<html> 
<head>
	<title> task-1 </title>
	<style>
	div {
		width:30%;
		margin:auto;
		padding:10px;
		background-color:lightblue;
		border-radius:10px
	}
	h1 {
		margin:0px;
		font-size:20px;
	}
	form {
		padding:20px;
	}
	input {
		width:100%;
		margin-top:5px;
		border:none;
		border-radius:5px;
		margin-bottom:10px;
		padding:5px
	}
	.size {
		width:20%;
		float:left
	}
	.dec {
		margin-top:0px;
	}
	.bg {
		padding:10px;
		border:none;
		background-color:orange;
		padding-left:20px;
		padding-right:20px;
		border-radius:5px
	}
	.bg2 {
		background-color:yellow;
	} 
	</style>
</head>
<body>
	<div>

	<!------heading------------>

	<h1> Type Checking.... </h1>
	
	<!------form----------------->

	<form>

	<!------------type-1-------------------->

	<label> Type : email </label> </br>
	<input type="email" placeholder="Enter your email" /> </br>

	<!------------type-2-------------------->

	<label> Type : datetime-local </label> </br>
	<input type="datetime-local" placeholder="Enter the date" /> </br>

	<!------------type-3-------------------->

	<label> Type : file </label> </br>
	<input type="file" placeholder="choose file" /> </br>

	<!------------type-4-------------------->

	<label> Type : month </label> </br>
	<input type="month" /> </br>

	<!------------type-5-------------------->

	<label> Type : range </label> </br>
	<input type="range" /> </br>

	<!------------type-6-------------------->

	<label> Type : time </label> </br>
	<input type="time" /> </br>

	<!------------type-7-------------------->

	<label> Type : url </label> </br>
	<input type="url" placeholder="www.search//" /> </br>

	<!------------type-8-------------------->

	<label> Type : week </label> </br>
	<input type="week" /> </br>

	<!------------type-9-------------------->

	<label> Type : tel </label> </br>
	<input type="tel" placeholder="Enter your name" /> </br>

	<!------------type-10-------------------->

	<label> Type : hidden </label> </br>
	<input type="hidden" placeholder="Enter your name" /> </br>
	
	<!------------submit-------------------->

	<button class="bg"> Submit </button>

	<!------------reset-------------------->

	<button class="bg bg2"> Reset </button>








	</form>
	</div>
</body>
</html>
